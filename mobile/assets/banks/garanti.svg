<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- Garanti BBVA — green wordmark style -->
  <rect width="120" height="40" fill="none"/>
  <!-- Green "G" mark -->
  <rect x="2" y="4" width="32" height="32" rx="6" fill="#009900"/>
  <text x="18" y="26" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle">G</text>
  <!-- Wordmark -->
  <text x="42" y="17" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#009900">GARANTİ</text>
  <text x="42" y="31" font-family="Arial,sans-serif" font-size="10" font-weight="400" fill="#555555">BBVA</text>
</svg>
