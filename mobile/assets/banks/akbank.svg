<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- Akbank — red modernist wordmark -->
  <rect width="120" height="40" fill="none"/>
  <!-- Red dot mark -->
  <circle cx="18" cy="20" r="14" fill="#E8000D"/>
  <text x="18" y="25" font-family="Arial Black,sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">A</text>
  <!-- Wordmark -->
  <text x="40" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#E8000D">akbank</text>
</svg>
