<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- Ziraat Bankası — red with wheat icon -->
  <rect width="120" height="40" fill="none"/>
  <!-- Red square -->
  <rect x="2" y="4" width="32" height="32" rx="4" fill="#CC0000"/>
  <!-- Wheat / Z letter -->
  <text x="18" y="26" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle">Z</text>
  <!-- Wordmark -->
  <text x="42" y="17" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#CC0000">ZİRAAT</text>
  <text x="42" y="31" font-family="Arial,sans-serif" font-size="9" font-weight="400" fill="#555555">BANKASI</text>
</svg>
