<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- İş Bankası — blue triangular motif -->
  <rect width="120" height="40" fill="none"/>
  <!-- Triangle symbol -->
  <polygon points="20,6 34,30 6,30" fill="none" stroke="#003087" stroke-width="3"/>
  <line x1="20" y1="6" x2="20" y2="30" stroke="#003087" stroke-width="2"/>
  <!-- Wordmark -->
  <text x="42" y="17" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#003087">İŞ BANKASI</text>
  <text x="42" y="31" font-family="Arial,sans-serif" font-size="9" font-weight="400" fill="#666666">TÜRKİYE</text>
</svg>
